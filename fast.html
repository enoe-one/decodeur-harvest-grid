<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Décodeur Rapide — Harvest Grid</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page page--narrow">

  <a class="nav-back" href="index.html">Accueil</a>

  <div class="header">
    <div class="header__label">outil 01</div>
    <h1 class="header__title">Décodeur <span>Rapide</span></h1>
    <p class="header__desc">Convertissez un fichier .save en JSON, ou un JSON en sauvegarde encodée.</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn mode-btn--active" id="btn-decode" onclick="setMode('decode')">
      decode — .save → json
    </button>
    <button class="mode-btn" id="btn-encode" onclick="setMode('encode')">
      encode — json → .save
    </button>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput">
    <div class="drop-zone__icon">↓</div>
    <div class="drop-zone__title" id="dropTitle">Déposez votre fichier .save ici</div>
    <div class="drop-zone__sub">ou cliquez pour parcourir</div>
    <div class="drop-zone__file" id="fileName" style="display:none"></div>
  </div>

  <br>

  <button class="btn btn--primary btn--full" id="btnConvert" onclick="convert()" disabled>
    <span id="btnLabel">Décoder</span>
  </button>

  <div class="output" id="outputSection" style="display:none">
    <hr class="divider">
    <div class="output__header">
      <span class="output__label">Résultat</span>
      <div class="output__actions">
        <button class="btn" onclick="copyResult()">Copier</button>
        <button class="btn btn--primary" id="btnDownload" onclick="downloadResult()">Télécharger</button>
      </div>
    </div>
    <textarea id="outputArea" readonly></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let mode = 'decode';
let fileContent = null;
let fileName = '';

function setMode(m) {
  mode = m;
  document.getElementById('btn-decode').classList.toggle('mode-btn--active', m === 'decode');
  document.getElementById('btn-encode').classList.toggle('mode-btn--active', m === 'encode');
  document.getElementById('dropTitle').textContent =
    m === 'decode' ? 'Déposez votre fichier .save ici' : 'Déposez votre fichier .json ou .txt ici';
  document.getElementById('btnLabel').textContent = m === 'decode' ? 'Décoder' : 'Encoder';
  document.getElementById('outputSection').style.display = 'none';
  fileContent = null;
  document.getElementById('fileName').style.display = 'none';
  document.getElementById('btnConvert').disabled = true;
}

// File input
document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files[0]) loadFile(this.files[0]);
});

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drop-zone--active'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drop-zone--active'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drop-zone--active');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    fileContent = e.target.result;
    const el = document.getElementById('fileName');
    el.textContent = file.name;
    el.style.display = 'inline-block';
    document.getElementById('btnConvert').disabled = false;
  };
  reader.readAsText(file);
}

// --- zlib via native browser streams (no external lib) ---

async function zlibInflate(base64) {
  const binaryStr = atob(base64.trim());
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

  const ds = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();

  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const chunk of chunks) { out.set(chunk, offset); offset += chunk.length; }
  return new TextDecoder().decode(out);
}

async function zlibDeflate(str) {
  const bytes = new TextEncoder().encode(str);
  const cs = new CompressionStream('deflate');
  const writer = cs.writable.getWriter();
  writer.write(bytes);
  writer.close();

  const chunks = [];
  const reader = cs.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const chunk of chunks) { out.set(chunk, offset); offset += chunk.length; }
  let binary = '';
  for (let i = 0; i < out.length; i++) binary += String.fromCharCode(out[i]);
  return btoa(binary);
}

// ---------------------------------------------------------

async function convert() {
  if (!fileContent) return;
  const btn = document.getElementById('btnConvert');
  btn.disabled = true;
  btn.querySelector('span').textContent = '...';
  try {
    let result, outFile;
    if (mode === 'decode') {
      const json = await zlibInflate(fileContent);
      result = JSON.stringify(JSON.parse(json), null, 2);
      outFile = fileName.replace(/\.save$/i, '') + '.json';
    } else {
      JSON.parse(fileContent); // validate
      result = await zlibDeflate(fileContent.trim());
      outFile = fileName.replace(/\.(json|txt)$/i, '') + '.save';
    }
    showOutput(result, outFile);
    toast('Conversion réussie', 'ok');
  } catch(e) {
    toast('Erreur : ' + e.message, 'err');
  }
  btn.disabled = false;
  document.getElementById('btnLabel').textContent = mode === 'decode' ? 'Décoder' : 'Encoder';
}

let outputData = '', outputFile = '';
function showOutput(data, filename) {
  outputData = data;
  outputFile = filename;
  document.getElementById('outputArea').value = data;
  document.getElementById('outputSection').style.display = 'block';
  document.getElementById('btnDownload').textContent = filename;
}

function copyResult() {
  navigator.clipboard.writeText(outputData).then(() => toast('Copié', 'ok'));
}

function downloadResult() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([outputData], { type: 'text/plain' }));
  a.download = outputFile;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Téléchargement lancé', 'ok');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast--show' + (type ? ' toast--' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('toast--show'), 3000);
}
</script>
</body>
</html>
